# Render Blueprint — backend API
# Dashboard: https://dashboard.render.com → New → Blueprint → connect this repo
services:
  - type: web
    name: esoftwarestore-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://www.esoftwarestore.com
      - key: API_PUBLIC_URL
        value: https://esoftwarestore-api.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PAYU_MERCHANT_KEY
        sync: false
      - key: PAYU_MERCHANT_SALT
        sync: false
      - key: PAYU_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: eSoftware Store <info@esoftwarestore.com>
      - key: RESEND_SANDBOX
        value: "false"
      - key: DEFAULT_COUNTRY
        value: US
      - key: DEFAULT_CURRENCY
        value: USD
      - key: CATALOG_BASE_CURRENCY
        value: USD
      - key: DEFAULT_LOCALE
        value: en
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
